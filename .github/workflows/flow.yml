      # 4. Info about Docker Engine, api version
      - name: Verificar version docker engine, api
        run: |
         ls -la $(which docker)
         #docker ps
         docker version
         docker context show
         docker context ls
         #docker context inspect
      
      # 5. Descarga el código del repositorio en el ejecutor
      - name: Checkout code
        uses: actions/checkout@v6

      # 4. Instala la herramienta Swiftly y la última versión de Swift TODO
      # Swiftly pone el ejecutable de 'swift' en el PATH del ejecutor
      - name: Install Swift
        uses: vapor/swiftly-action@v0.2.1
        with:
          toolchain: latest

      # 6. Compila el proyecto
      - name: Build Project
        run: swift build

      # 7. Lanza los tests enfocándose en el target VaporWithTestContainersTests
      # Nota: El comando 'swift test --filter' es el estándar de Swift Package Manager
      - name: Run VaporWithTestContainersTests
        run: |
             #export TESTCONTAINERS_RUN_DOCKERS_TESTS=1
             export TESTCONTAINERS_RUNTIME=docker
             swift test --filter VaporWithTestContainersTests 2>&1 | tee tests_output.txt
             if grep -q "suites failed" tests_output.txt; then
               echo "Fallaron los tests"
               exit 1
             fi
             if grep -q "error: fatalError" tests_output.txt; then
               echo "Error fatal grave"
               exit 1
             fi
             echo "Todos los tests pasaron satisfactoriamente"
             # Es otra forma de lanzar los tests, comprobando su resultado satisfactorio o no
  security-review:
    needs: build-and-test          # solo corre si build-and-test pasa
    if: github.event_name == 'pull_request'   # solo en PRs, no en push a main
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: anthropics/claude-code-security-review@main
        with:
          comment-pr: true
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          claude-model: claude-haiku-4-5-20251001
          exclude-directories: "Tests/VaporWithTestContainersTests"
          # run-every-commit: true # corre en cada commit, false solo la primera vez
