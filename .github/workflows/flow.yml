name: 1 - Workflow complete Swift Vapor CI/Security review

# El flujo se activa al hacer push o abrir un PR en la rama principal
on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # Vapor suele ejecutarse en entornos Linux para servidor
    # runs-on: ubuntu-latest
    #needs: test-container
    runs-on: macos-266

